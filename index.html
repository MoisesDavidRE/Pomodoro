<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="../P01R01MDRE/Style/style.css">
</head>
<body>
    <div class="container">
        <h1>Pomodoro</h1>
        <div id="display">25:00</div>
        
        <div class="controls">
            <button id="start">Iniciar</button>
            <button id="pause">Pausar</button>
            <button id="reset">Reiniciar</button>
        </div>
        
        <div class="modes">
            <button id="workMode" class="active">Trabajo</button>
            <button id="breakMode">Descanso</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
